<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
  import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
  import { getFirestore, collection, addDoc, getDocs, doc, deleteDoc, updateDoc, setDoc, getDoc, onSnapshot, query, orderBy, serverTimestamp, Timestamp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

  const firebaseConfig = { apiKey:"AIzaSyD-ZPtk7SgDdZ-BBGmGjcXuRuO1Hh-Tj0o", authDomain:"diary-1d399.firebaseapp.com", projectId:"diary-1d399", storageBucket:"diary-1d399.firebasestorage.app", messagingSenderId:"230492568365", appId:"1:230492568365:web:cf04c2e0f6c73838b5b1a4" };
  const TRUSTED_UIDS = ["rEAVYuPlDrTjZsqmqGE5TeHFSX73"];

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  window._fb = { auth, db, collection, addDoc, getDocs, doc, deleteDoc, updateDoc, setDoc, getDoc, onSnapshot, query, orderBy, serverTimestamp, Timestamp, TRUSTED_UIDS };

  onAuthStateChanged(auth, async (user) => {
    if (!user) { await signInAnonymously(auth); return; }
    window._me = user;
    document.querySelectorAll('.display-uid').forEach(el => el.textContent = user.uid);
    if (TRUSTED_UIDS.includes(user.uid)) { window.enterApp('trusted'); }
    else {
      try {
        const gd = await getDoc(doc(db,'guest_access',user.uid));
        if (gd.exists() && (gd.data().expiresAt?.toMillis?.() || 0) > Date.now()) { window.enterApp('guest'); return; }
      } catch(_) {}
      document.getElementById('screen-loading').style.display = 'none';
      document.getElementById('screen-guest').style.display = 'flex';
    }
  });
  signInAnonymously(auth).catch(e => {
    document.getElementById('screen-loading').innerHTML = '<p style="color:#c44;font-size:13px">Firebase 連線失敗：' + e.message + '</p>';
  });
</script>

/* ═══════════════════════════════════════
   VARIABLES

* { box-sizing:border-box; margin:0; padding:0; }

/* ═══════════════════════════════════════
   STEALTH MODE
   Strategy: two-layer approach.
   1. body filter: sepia+brightness flattens mid-tones to warm paper.
   2. Direct color overrides on high-contrast elements (dark backgrounds,
      dark text, borders) so nothing stands out at camera distance.
   Near-screen (~55cm): faint warm text still legible.
   Camera / oblique: uniform blank cream page.
═══════════════════════════════════════ */

/* Override all dark-background elements to near-paper */

body.stealth .btn-save,
body.stealth .btn-main,
body.stealth .mob-btn-new,
body.stealth .mob-btn-save,

  color: rgba(120,105,70,0.55) !important;
  border-color: rgba(180,160,110,0.15) !important;

}

/* Borders and dividers — near invisible */

  border-color: rgba(190,175,135,0.12) !important;

}

/* Text in all elements */
body.stealth,
body.stealth * {
  color: rgba(80,68,40,0.88) !important;
  text-shadow: none !important;
}

/* Backgrounds that were white/off-white stay paper-like via filter,

}

/* Energy bar mobile */

/* Mobile bottom bar */

/* Mobile editor */

/* Bottom bar — always pinned, never pushed off screen */

/* ── Mobile dual-column (split view) ── */

.mob-split-pos { background:linear-gradient(180deg,rgba(196,162,74,0.07) 0%,transparent 80%); }

}

.mob-split-textarea {

}
.mob-split-textarea::placeholder { color:rgba(74,98,132,.18); }

/* ── PC Backup button ── */
.btn-backup {
  width:100%; padding:9px; background:none; border:1px solid var(--border-g);
  border-radius:var(--radius); font-size:11px; cursor:pointer;
  font-family:'Noto Sans TC',sans-serif; color:var(--blue-soft); transition:all .2s;

}

/* ── Backup verify modal ── */
.backup-modal-wrap {
  display:none; position:fixed; inset:0; background:rgba(13,27,46,.5);

}
.backup-modal-wrap.open { display:flex; }
.backup-modal {
  background:var(--white); border-radius:var(--radius); padding:32px 36px;
  width:min(360px,92vw); border:1px solid var(--border-g); box-shadow:var(--shadow); position:relative; overflow:hidden;
}
.backup-modal::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--gold-deep),var(--gold-light),var(--gold-deep)); }
.backup-modal h3 { font-family:'Cormorant Garamond',serif; font-size:17px; margin-bottom:5px; color:var(--navy); letter-spacing:2px; }

/* ── Backup history popup ── */

</style>
</head>

    </div>
    <button class="btn-main" onclick="generateToken()">產 生 新 驗 證 碼</button>
    <button class="btn-outline btn-revoke" id="btn-revoke" onclick="revokeAllGuests()" style="margin-top:7px;border-color:#b04040;color:#b04040;">強制登出所有訪客</button>
    <button class="btn-outline" onclick="closeModal()">關 閉</button>
  </div>
</div>

<!-- Tooltip -->
<div class="cal-tooltip" id="cal-tooltip"></div>

<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════ SHARED STATE ═══════════════════════ */
let curId = null, mood = '', entries = [], durMin = 30, timerInt = null;
let calYear = new Date().getFullYear(), calMonth = new Date().getMonth();
let mobCalYear = new Date().getFullYear(), mobCalMonth = new Date().getMonth();
let autoSaveTimer = null, stealthOn = false, selectedDate = null;
let mobCurId = null, mobMood = '', mobAutoSaveTimer = null;

/* ═══════════════════════ SYNC ICON ═══════════════════════ */
function setSyncState(state) {
  // state: 'idle' | 'syncing' | 'error'
  ['sync-icon','mob-sync-icon'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.className = id.replace('-icon','') + (id.startsWith('mob') ? '-icon' : ' sync-icon');
    if (state === 'syncing') { el.className += ' syncing'; el.style.color = ''; }
    else if (state === 'error') { el.className += ' error'; el.style.color = ''; }
    else { el.style.color = 'transparent'; }
  });
  // re-apply proper class names (simpler):
  const pc = document.getElementById('sync-icon');
  const mob = document.getElementById('mob-sync-icon');
  if (pc) pc.className = state === 'syncing' ? 'sync-icon syncing' : state === 'error' ? 'sync-icon error' : 'sync-icon';
  if (mob) mob.className = state === 'syncing' ? 'mob-sync-icon syncing' : state === 'error' ? 'mob-sync-icon error' : 'mob-sync-icon';
}

/* ═══════════════════════ AUTH ═══════════════════════ */
document.querySelectorAll('#code-inputs input').forEach((inp, i, all) => {
  let _keyHandled = false;

  inp.addEventListener('keydown', e => {
    _keyHandled = false;
    if (e.key === 'Backspace') {
      e.preventDefault();
      _keyHandled = true;
      if (inp.value) {
        inp.value = '';
        all.forEach(x => x.classList.toggle('filled', !!x.value));
        document.getElementById('btn-verify').disabled = true;
      } else if (i > 0) {
        all[i-1].value = '';
        all[i-1].focus();
        all.forEach(x => x.classList.toggle('filled', !!x.value));
        document.getElementById('btn-verify').disabled = true;
      }
      return;
    }
    if (e.key === 'ArrowLeft' && i > 0)  { e.preventDefault(); _keyHandled = true; all[i-1].focus(); return; }
    if (e.key === 'ArrowRight' && i < all.length-1) { e.preventDefault(); _keyHandled = true; all[i+1].focus(); return; }
    if (e.key === 'Enter') { _keyHandled = true; verifyToken(); return; }
    // Desktop: single digit key — fill and advance
    if (/^[0-9]$/.test(e.key)) {
      e.preventDefault();
      _keyHandled = true;
      inp.value = e.key;
      all.forEach(x => x.classList.toggle('filled', !!x.value));
      const code = [...all].map(x => x.value).join('');
      document.getElementById('btn-verify').disabled = code.length < 6;
      if (i < all.length - 1) all[i + 1].focus();
    }
  });
  // input: handles mobile virtual keyboard only (e.key is 'Unidentified' on mobile)
  inp.addEventListener('input', () => {
    if (_keyHandled) { _keyHandled = false; return; } // already handled by keydown
    // Take only the last digit entered, discard rest
    const digit = inp.value.replace(/\D/g, '').slice(-1);
    inp.value = digit;
    all.forEach(x => x.classList.toggle('filled', !!x.value));
    const code = [...all].map(x => x.value).join('');
    document.getElementById('btn-verify').disabled = code.length < 6;
    if (digit && i < all.length - 1) all[i + 1].focus();
  });
  inp.addEventListener('paste', e => {
    e.preventDefault();
    const p = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '').slice(0, 6);
    p.split('').forEach((ch, j) => { if (all[j]) all[j].value = ch; });
    const focusIdx = Math.min(p.length, all.length - 1);
    all[focusIdx].focus();
    document.getElementById('btn-verify').disabled = p.length < 6;
    all.forEach(x => x.classList.toggle('filled', !!x.value));
  });
});

async function verifyToken() {
  const { db, doc, getDoc, setDoc, Timestamp } = window._fb;
  const code = [...document.querySelectorAll('.code-inputs input')].map(x=>x.value).join('');
  const errEl = document.getElementById('guest-err');
  errEl.textContent = '';
  document.getElementById('btn-verify').disabled = true;
  document.getElementById('btn-verify').textContent = '驗證中…';
  try {
    const td = await getDoc(doc(db,'tokens',code));
    if (!td.exists()) throw new Error('驗證碼不存在');
    if ((td.data().expiresAt?.toMillis?.() || 0) < Date.now()) throw new Error('驗證碼已過期');
    await setDoc(doc(db,'guest_access',window._me.uid), { grantedAt:Timestamp.now(), expiresAt:td.data().expiresAt });
    window.enterApp('guest');
  } catch(e) {
    errEl.textContent = e.message;
    document.querySelectorAll('.code-inputs input').forEach(x=>{ x.classList.add('err'); setTimeout(()=>x.classList.remove('err'),400); });
    document.getElementById('btn-verify').disabled = false;
    document.getElementById('btn-verify').textContent = '驗 證 進 入';
  }
}

window.enterApp = function(role) {
  document.getElementById('screen-loading').style.display = 'none';
  document.getElementById('screen-guest').style.display = 'none';
  document.getElementById('screen-app').style.display = '';
  document.getElementById('screen-mobile').style.display = '';
  window._role = role;
  // PC badges
  const b = document.getElementById('role-badge');
  if (b) {
    if (role === 'trusted') {
      b.textContent='✦ 信任裝置'; b.className='role-badge trusted';
      document.getElementById('status-txt').textContent='信任裝置 · 完整存取';
      // 自動清除過期訪客紀錄
      purgeExpiredGuests();
      // Show key button for trusted
      document.getElementById('cal-new-row').style.display='flex';
      document.getElementById('btn-gen').style.display='flex';
      document.getElementById('backup-row').style.display='block';
    } else {
      b.textContent='◈ 訪客模式'; b.className='role-badge guest';
      b.title='點擊登出'; b.style.cursor='pointer';
      b.onclick = async function() {
        if(!confirm('確定要登出訪客模式？')) return;
        const {auth, db, doc, deleteDoc} = window._fb;
        try { await deleteDoc(doc(db,'guest_access',window._me.uid)); } catch(_) {}
        try { await auth.signOut(); } catch(_) {}
        location.reload();
      };
      document.getElementById('status-txt').textContent='訪客模式 · 限時存取';
      document.getElementById('backup-row').style.display='block';
      if(!stealthOn){toggleStealth();}
      // 訪客：用 onSnapshot 即時監聽 guest_access，一旦被刪除或過期立刻 reload
      if (!window._guestUnsub) {
        const { db, doc, onSnapshot } = window._fb;
        window._guestUnsub = onSnapshot(doc(db, 'guest_access', window._me.uid), (snap) => {
          if (!snap.exists() || (snap.data().expiresAt?.toMillis?.() || 0) <= Date.now()) {
            window._guestUnsub && window._guestUnsub();
            location.reload();
          }
        }, () => { location.reload(); });
      }
    }
  }
  // Mobile badges
  const mb = document.getElementById('mob-badge');
  if (mb) mb.textContent = role === 'trusted' ? '✦ 信任裝置' : '◈ 訪客模式';
  const mobRevoke = document.getElementById('mob-btn-revoke');
  if (mobRevoke) mobRevoke.style.display = role === 'trusted' ? '' : 'none';
  const mobToken = document.getElementById('mob-btn-token');
  if (mobToken) mobToken.style.display = role === 'trusted' ? '' : 'none';
  loadEntries();
};

/* ═══════════════════════ DATA ═══════════════════════ */
async function loadEntries() {
  // 訪客：先確認 guest_access 仍有效，否則 reload
  if (window._role === 'guest') {
    try {
      const { db, doc, getDoc } = window._fb;
      const gd = await getDoc(doc(db, 'guest_access', window._me.uid));
      if (!gd.exists() || (gd.data().expiresAt?.toMillis?.() || 0) <= Date.now()) {
        location.reload(); return;
      }
    } catch(_) {}
  }
  const { db, collection, query, orderBy, getDocs } = window._fb;
  try {
    setSyncState('syncing');
    const q = query(collection(db,'users','diary','entries'), orderBy('createdAt','desc'));
    const snap = await getDocs(q);
    const wasEmpty = entries.length === 0;
    entries = snap.docs.map(d=>({id:d.id,...d.data()}));
    setSyncState('idle');
    renderCalendar(); renderMobCalendar();
    updateEnergyBar();
    // On first load, auto-open today on PC
    if (wasEmpty) {
      const t = new Date();
      selectDay(t.getFullYear(), t.getMonth(), t.getDate());
    }
  } catch(e) { setSyncState('error'); console.warn(e); }
}

/* ═══════════════════════ CALENDAR HELPERS ═══════════════════════ */
function getEntryDateSet() {
  const s = new Set();
  entries.forEach(e => {
    const d = e.createdAt?.toDate ? e.createdAt.toDate() : null;
    if (d) s.add(`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`);
  });
  return s;
}

// Returns {pos, neg, both} word counts for a given y-m-d
function getDayStats(y, m, d) {
  const de = entries.filter(e => {
    const dt = e.createdAt?.toDate ? e.createdAt.toDate() : null;
    return dt && dt.getFullYear()===y && dt.getMonth()===m && dt.getDate()===d;
  });
  let pos = 0, neg = 0;
  de.forEach(e => {
    const wc = (e.body||'').replace(/\s/g,'').length;
    if (e.mood === 'positive') pos += wc;
    else if (e.mood === 'negative') neg += wc;
    // no mood: not counted
  });
  return { pos, neg, entries: de };
}

/* ═══════════════════════ PC CALENDAR ═══════════════════════ */
function renderCalendar() {
  const months = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  document.getElementById('cal-month-label').textContent = `${calYear} · ${months[calMonth]}`;
  const grid = document.getElementById('cal-grid');
  const headers = [...grid.querySelectorAll('.cal-dow')];
  grid.innerHTML = ''; headers.forEach(h => grid.appendChild(h));
  const today = new Date();
  const dates = getEntryDateSet();
  const first = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  for (let i=0;i<first;i++) { const x=document.createElement('div'); x.className='cal-day'; grid.appendChild(x); }
  for (let day=1; day<=daysInMonth; day++) {
    const el = document.createElement('div'); el.className='cal-day'; el.textContent=day;
    const key = `${calYear}-${calMonth}-${day}`;
    if (dates.has(key)) el.classList.add('has-entry');
    if (today.getFullYear()===calYear && today.getMonth()===calMonth && today.getDate()===day) el.classList.add('today');
    if (selectedDate && selectedDate.y===calYear && selectedDate.m===calMonth && selectedDate.d===day) el.classList.add('selected');
    // Hover tooltip
    el.addEventListener('mouseenter', ev => showTooltip(ev, calYear, calMonth, day));
    el.addEventListener('mousemove', ev => moveTooltip(ev));
    el.addEventListener('mouseleave', hideTooltip);
    el.onclick = () => selectDay(calYear, calMonth, day);
    grid.appendChild(el);
  }
}
function calPrev() { calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCalendar(); }
function calNext() { calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCalendar(); }

/* ═══════════════════════ TOOLTIP ═══════════════════════ */
function showTooltip(ev, y, m, d) {
  const { pos, neg } = getDayStats(y, m, d);
  if (!pos && !neg) return;
  const tt = document.getElementById('cal-tooltip');
  let html = '';
  if (pos) html += `<span class="tt-pos">✧ ${pos}</span>`;
  if (pos && neg) html += '<br>';
  if (neg) html += `<span class="tt-neg">✦ ${neg}</span>`;
  tt.innerHTML = html;
  moveTooltip(ev);
  tt.classList.add('show');
}
function moveTooltip(ev) {
  const tt = document.getElementById('cal-tooltip');
  const ttW = tt.offsetWidth || 120, ttH = tt.offsetHeight || 50;
  let x = ev.clientX + 14, y = ev.clientY + 14;
  if (x + ttW + 4 > window.innerWidth) x = ev.clientX - ttW - 6;
  if (y + ttH + 4 > window.innerHeight) y = ev.clientY - ttH - 6;
  if (x < 4) x = 4;
  if (y < 4) y = 4;
  tt.style.left = x + 'px'; tt.style.top = y + 'px';
}
function hideTooltip() { document.getElementById('cal-tooltip').classList.remove('show'); }

/* ═══════════════════════ ENERGY BAR ═══════════════════════ */
function updateEnergyBar() {
  // Count days in current calMonth: pure-pos / mixed / pure-neg
  const y = calYear, m = calMonth;
  const daysInMonth = new Date(y, m+1, 0).getDate();
  let pure_pos = 0, mixed = 0, pure_neg = 0, total = 0;
  for (let d=1; d<=daysInMonth; d++) {
    const de = entries.filter(e => {
      const dt = e.createdAt?.toDate ? e.createdAt.toDate() : null;
      return dt && dt.getFullYear()===y && dt.getMonth()===m && dt.getDate()===d;
    });
    if (!de.length) continue;
    const hasPos = de.some(e=>e.mood==='positive');
    const hasNeg = de.some(e=>e.mood==='negative');
    if (hasPos && hasNeg) mixed++;
    else if (hasPos) pure_pos++;
    else if (hasNeg) pure_neg++;
    else pure_pos++; // no mood → treat neutral as pos
    total++;
  }
  if (!total) { setBar('energy-fill', 0, 0, 0); setBar('mob-energy-fill', 0, 0, 0); return; }
  const pP = pure_pos/total, pM = mixed/total, pN = pure_neg/total;
  setBar('energy-fill', pP, pM, pN);
  setBar('mob-energy-fill', pP, pM, pN);
}

function setBar(id, pP, pM, pN) {
  const el = document.getElementById(id); if (!el) return;
  if (pP===0 && pM===0 && pN===0) { el.style.width='0%'; el.style.background=''; return; }
  // gold: #c9a84c  mixed: #8a7a56 (warm blue-gold blend)  navy: #2a4a7a
  const stops = [];
  let pos = 0;
  const push = (color, frac) => {
    if (frac <= 0) return;
    stops.push(`${color} ${(pos*100).toFixed(1)}%`);
    pos += frac;
    stops.push(`${color} ${(pos*100).toFixed(1)}%`);
  };
  push('#c9a84c', pP);
  push('#7a8a6a', pM); // gold-navy mix
  push('#2a4a7a', pN);
  el.style.width = '100%';
  el.style.background = stops.length > 0 ? `linear-gradient(90deg, ${stops.join(', ')})` : '#c9a84c';
}

/* ═══════════════════════ DAY SELECTION ═══════════════════════ */
function selectDay(y, m, d) {
  selectedDate = {y, m, d};
  compareOn = false;
  renderCalendar();
  const dayEntries = entries.filter(e => {
    const dt = e.createdAt?.toDate ? e.createdAt.toDate() : null;
    return dt && dt.getFullYear()===y && dt.getMonth()===m && dt.getDate()===d;
  });
  if (dayEntries.length > 0) openEntry(dayEntries[0].id);
  else {
    curId=null; mood='';
    const dateObj = new Date(y, m, d);
    document.getElementById('entry-date').textContent = dateObj.toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
    document.getElementById('entry-body').value='';
    updateMoodUI();
    document.getElementById('btn-del').style.display='none';
    document.getElementById('edview').style.display='flex';
    document.getElementById('ed-body').style.display='flex';
    document.getElementById('compare-view').style.display='none';
    document.getElementById('btn-compare').style.display='none';
    document.getElementById('ed-body').className='ed-body';
    updateWordCount();
    document.getElementById('entry-body').focus();
  }
  updateCompareBtn(y, m, d);
}

/* ═══════════════════════ COMPARE MODE ═══════════════════════ */
let compareOn = false;

function updateCompareBtn(y, m, d) {
  const { pos, neg, entries: de } = getDayStats(y, m, d);
  const hasPos = de.some(e => e.mood === 'positive');
  const hasNeg = de.some(e => e.mood === 'negative');
  const btn = document.getElementById('btn-compare');
  if (btn) btn.style.display = (hasPos && hasNeg) ? 'flex' : 'none';
  if (!(hasPos && hasNeg) && compareOn) exitCompare();
}

function toggleCompare() {
  compareOn = !compareOn;
  document.getElementById('btn-compare').classList.toggle('active', compareOn);
  if (compareOn) renderCompare();
  else exitCompare();
}

function exitCompare() {
  compareOn = false;
  const btn = document.getElementById('btn-compare');
  if (btn) btn.classList.remove('active');
  document.getElementById('compare-view').style.display = 'none';
  document.getElementById('compare-actions').style.display = 'none';
  document.getElementById('ed-body').style.display = 'flex';
}

let _cmpPosId = null, _cmpNegId = null;

function renderCompare() {
  if (!selectedDate) return;
  const { y, m, d } = selectedDate;
  const de = entries.filter(e => {
    const dt = e.createdAt?.toDate ? e.createdAt.toDate() : null;
    return dt && dt.getFullYear()===y && dt.getMonth()===m && dt.getDate()===d;
  });
  const posEntry = de.find(e => e.mood === 'positive');
  const negEntry = de.find(e => e.mood === 'negative');
  _cmpPosId = posEntry ? posEntry.id : null;
  _cmpNegId = negEntry ? negEntry.id : null;

  const fmt = e => {
    const dt = e.createdAt?.toDate ? e.createdAt.toDate() : new Date();
    return dt.toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
  };

  document.getElementById('cmp-date-pos').textContent = posEntry ? fmt(posEntry) : '';
  document.getElementById('cmp-text-pos').value = posEntry ? (posEntry.body||'') : '';
  document.getElementById('cmp-text-pos').disabled = !posEntry;

  document.getElementById('cmp-date-neg').textContent = negEntry ? fmt(negEntry) : '';
  document.getElementById('cmp-text-neg').value = negEntry ? (negEntry.body||'') : '';
  document.getElementById('cmp-text-neg').disabled = !negEntry;

  document.getElementById('ed-body').style.display = 'none';
  document.getElementById('compare-view').style.display = 'flex';
  document.getElementById('compare-actions').style.display = 'flex';
}

async function _saveBoth() {
  const { db, doc, updateDoc } = window._fb;
  const posBody = document.getElementById('cmp-text-pos').value.trim();
  const negBody = document.getElementById('cmp-text-neg').value.trim();
  setSyncState('syncing');
  try {
    const ops = [];
    if (_cmpPosId && posBody) { ops.push(updateDoc(doc(db,'users','diary','entries',_cmpPosId),{body:posBody,mood:'positive'})); const i=entries.findIndex(e=>e.id===_cmpPosId); if(i!==-1) entries[i].body=posBody; }
    if (_cmpNegId && negBody) { ops.push(updateDoc(doc(db,'users','diary','entries',_cmpNegId),{body:negBody,mood:'negative'})); const i=entries.findIndex(e=>e.id===_cmpNegId); if(i!==-1) entries[i].body=negBody; }
    await Promise.all(ops);
    setSyncState('idle'); showToast('已更新 ✦');
  } catch(e) { setSyncState('error'); showToast('儲存失敗'); }
}

function _delBoth() {
  delBothEntries(_cmpPosId, _cmpNegId);
}


function toggleStealth() {
  stealthOn = !stealthOn;
  document.body.classList.toggle('stealth', stealthOn);
  document.getElementById('stealth-btn').classList.toggle('active', stealthOn);
}
document.addEventListener('keydown', e => { if (e.ctrlKey&&e.shiftKey&&e.key==='H'){e.preventDefault();toggleStealth();} });

/* ═══════════════════════ PC ENTRY ═══════════════════════ */
function newEntry() {
  curId=null; mood=''; selectedDate=null;
  compareOn=false;
  document.getElementById('btn-compare').style.display='none';
  document.getElementById('btn-compare').classList.remove('active');
  document.getElementById('compare-view').style.display='none';
  document.getElementById('ed-body').style.display='flex';
  renderCalendar();
  document.getElementById('entry-body').value='';
  document.getElementById('entry-date').textContent = new Date().toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
  updateMoodUI();
  document.getElementById('btn-del').style.display='none';
  document.getElementById('ed-body').className='ed-body';
  updateWordCount();
  document.getElementById('entry-body').focus();
}

function openEntry(id) {
  const e = entries.find(x=>x.id===id); if (!e) return;
  curId=id; mood=e.mood||'';
  const dt = e.createdAt?.toDate ? e.createdAt.toDate() : new Date();
  document.getElementById('entry-date').textContent = dt.toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
  document.getElementById('entry-body').value = e.body||'';
  updateMoodUI();
  document.getElementById('btn-del').style.display='inline-block';
  document.getElementById('edview').style.display='flex';
  document.getElementById('ed-body').style.display='flex';
  document.getElementById('compare-view').style.display='none';
  if (compareOn) { compareOn=false; document.getElementById('btn-compare').classList.remove('active'); }
  updateWordCount();
  if (selectedDate) updateCompareBtn(selectedDate.y, selectedDate.m, selectedDate.d);
}

function selMood(m) {
  const newMood = (mood===m) ? '' : m;
  mood = newMood;
  updateMoodUI();
  // If we have a selected date, try to load the matching mood entry
  if (selectedDate) {
    const { y, m: mo, d } = selectedDate;
    const dayEntries = entries.filter(e => {
      const dt = e.createdAt?.toDate ? e.createdAt.toDate() : null;
      return dt && dt.getFullYear()===y && dt.getMonth()===mo && dt.getDate()===d;
    });
    const target = newMood ? dayEntries.find(e => e.mood === newMood) : null;
    if (target) {
      // Load existing entry for this mood (don't change curId flow, just update UI)
      curId = target.id;
      document.getElementById('entry-body').value = target.body || '';
      document.getElementById('btn-del').style.display = 'inline-block';
      updateWordCount();
      updateCompareBtn(y, mo, d);
      return;
    } else if (dayEntries.length > 0) {
      // No entry for this mood yet — open blank editor for this date
      curId = null;
      document.getElementById('entry-body').value = '';
      document.getElementById('btn-del').style.display = 'none';
      updateWordCount();
      updateCompareBtn(y, mo, d);
      return;
    }
  }
  scheduleAutoSave();
}
function updateMoodUI() {
  document.getElementById('ms-pos').className='mood-sym sym-positive'+(mood==='positive'?' on':'');
  document.getElementById('ms-neg').className='mood-sym sym-negative'+(mood==='negative'?' on':'');
  document.getElementById('ed-body').className='ed-body'+(mood==='positive'?' tint-pos':mood==='negative'?' tint-neg':'');
}

function scheduleAutoSave() {
  clearTimeout(autoSaveTimer);
  setSyncState('syncing');
  autoSaveTimer = setTimeout(async () => {
    await autoSave();
  }, 3000);
}

async function autoSave() {
  const { db, collection, addDoc, doc, updateDoc, serverTimestamp } = window._fb;
  const body = document.getElementById('entry-body').value.trim();
  if (!body) { setSyncState('idle'); return; }
  const data = { body, mood };
  try {
    if (curId) {
      await updateDoc(doc(db,'users','diary','entries',curId), data);
      const idx = entries.findIndex(e=>e.id===curId);
      if (idx!==-1) entries[idx]={...entries[idx],...data};
    } else {
      data.createdAt = serverTimestamp();
      const ref = await addDoc(collection(db,'users','diary','entries'), data);
      curId = ref.id;
      document.getElementById('btn-del').style.display='inline-block';
      await loadEntries(); setSyncState('idle'); return;
    }
    setSyncState('idle');
    renderCalendar(); updateEnergyBar();
  } catch(e) { setSyncState('error'); }
}

/* ═══════════════════════ MOBILE CALENDAR ═══════════════════════ */
function renderMobCalendar() {
  const months=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  document.getElementById('mob-cal-month').textContent=`${mobCalYear} · ${months[mobCalMonth]}`;
  const grid=document.getElementById('mob-cal-grid');
  const headers=[...grid.querySelectorAll('.mob-cal-dow')];
  grid.innerHTML=''; headers.forEach(h=>grid.appendChild(h));
  const today=new Date(), dates=getEntryDateSet();
  const first=new Date(mobCalYear,mobCalMonth,1).getDay();
  const daysInMonth=new Date(mobCalYear,mobCalMonth+1,0).getDate();
  for(let i=0;i<first;i++){const x=document.createElement('div');x.className='mob-cal-day';grid.appendChild(x);}
  for(let day=1;day<=daysInMonth;day++){
    const el=document.createElement('div'); el.className='mob-cal-day'; el.textContent=day;
    const key=`${mobCalYear}-${mobCalMonth}-${day}`;
    if(dates.has(key)) el.classList.add('has-entry');
    if(today.getFullYear()===mobCalYear&&today.getMonth()===mobCalMonth&&today.getDate()===day) el.classList.add('today');
    el.onclick=()=>mobSelectDay(mobCalYear,mobCalMonth,day);
    grid.appendChild(el);
  }
  updateEnergyBar();
}
function mobCalPrev(){mobCalMonth--;if(mobCalMonth<0){mobCalMonth=11;mobCalYear--;}renderMobCalendar();}
function mobCalNext(){mobCalMonth++;if(mobCalMonth>11){mobCalMonth=0;mobCalYear++;}renderMobCalendar();}

function setDur(btn){document.querySelectorAll('.dur-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');durMin=parseInt(btn.dataset.min);}
async function generateToken(){
  const{db,doc,setDoc,Timestamp}=window._fb;
  clearInterval(timerInt);
  const code=String(Math.floor(100000+Math.random()*900000));
  const expiresAt=new Timestamp(Math.floor(Date.now()/1000)+durMin*60,0);
  try{
    await setDoc(doc(db,'tokens',code),{createdBy:window._me.uid,createdAt:Timestamp.now(),expiresAt,durationMinutes:durMin});
    document.getElementById('token-num').textContent=code;
    let rem=durMin*60;
    const tick=()=>{
      const m=Math.floor(rem/60),s=rem%60;
      document.getElementById('token-tim').innerHTML=`有效時間剩餘 <span>${m}:${String(s).padStart(2,'0')}</span>`;
      if(rem<=0){clearInterval(timerInt);document.getElementById('token-tim').textContent='已過期';document.getElementById('token-num').textContent='——————';}
      rem--;
    };
    tick(); timerInt=setInterval(tick,1000);
  } catch(e){showToast('產生失敗：'+e.message);}
}

/* ═══════════════════════ BACKUP EXPORT ═══════════════════════ */
let backupLongPressTimer = null;

function openBackupModal() {
  document.getElementById('backup-modal').classList.add('open');
  document.getElementById('backup-err').textContent = '';
  document.getElementById('btn-backup-verify').disabled = true;
  setupBackupCodeInputs();
}
function closeBackupModal() {
  document.getElementById('backup-modal').classList.remove('open');
  document.querySelectorAll('#backup-code-inputs input').forEach(x => { x.value = ''; x.classList.remove('filled','err'); });
}

function setupBackupCodeInputs() {
  const all = [...document.querySelectorAll('#backup-code-inputs input')];
  all.forEach((inp, i) => {
    // Remove old listeners by cloning
    const fresh = inp.cloneNode(true);
    inp.parentNode.replaceChild(fresh, inp);
  });
  const inputs = [...document.querySelectorAll('#backup-code-inputs input')];
  inputs.forEach((inp, i) => {
    let _kh = false;
    inp.addEventListener('keydown', e => {
      _kh = false;
      if (e.key === 'Backspace') {
        e.preventDefault(); _kh = true;
        if (inp.value) {
          inp.value = '';
          inputs.forEach(x => x.classList.toggle('filled', !!x.value));
          document.getElementById('btn-backup-verify').disabled = true;
        } else if (i > 0) {
          inputs[i-1].value = '';
          inputs[i-1].focus();
          inputs.forEach(x => x.classList.toggle('filled', !!x.value));
          document.getElementById('btn-backup-verify').disabled = true;
        }
        return;
      }
      if (e.key === 'Enter') { _kh = true; verifyAndExport(); return; }
      if (/^[0-9]$/.test(e.key)) {
        e.preventDefault(); _kh = true;
        inp.value = e.key;
        inputs.forEach(x => x.classList.toggle('filled', !!x.value));
        const code = inputs.map(x => x.value).join('');
        document.getElementById('btn-backup-verify').disabled = code.length < 6;
        if (i < inputs.length - 1) inputs[i+1].focus();
      }
    });
    inp.addEventListener('input', () => {
      if (_kh) { _kh = false; return; }
      const digit = inp.value.replace(/\D/g, '').slice(-1);
      inp.value = digit;
      inputs.forEach(x => x.classList.toggle('filled', !!x.value));
      const code = inputs.map(x => x.value).join('');
      document.getElementById('btn-backup-verify').disabled = code.length < 6;
      if (digit && i < inputs.length - 1) inputs[i+1].focus();
    });
  });
}

async function verifyAndExport() {
  const { db, doc, getDoc } = window._fb;
  const code = [...document.querySelectorAll('#backup-code-inputs input')].map(x=>x.value).join('');
  const errEl = document.getElementById('backup-err');
  errEl.textContent = '';
  document.getElementById('btn-backup-verify').disabled = true;
  document.getElementById('btn-backup-verify').textContent = '驗證中…';
  try {
    const td = await getDoc(doc(db,'tokens',code));
    if (!td.exists()) throw new Error('驗證碼不存在');
    if ((td.data().expiresAt?.toMillis?.() || 0) < Date.now()) throw new Error('驗證碼已過期');
    // Export
    const exportData = entries.map(e => {
      const dt = e.createdAt?.toDate ? e.createdAt.toDate() : null;
      return { id: e.id, date: dt ? dt.toISOString() : null, mood: e.mood || '', body: e.body || '' };
    });
    const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const now = new Date();
    a.href = url;
    a.download = `diary_backup_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}.json`;
    a.click();
    URL.revokeObjectURL(url);
    // Save history
    saveBackupHistory(now);
    closeBackupModal();
    showToast('匯出成功 ✦');
  } catch(e) {
    errEl.textContent = e.message;
    document.querySelectorAll('#backup-code-inputs input').forEach(x=>{ x.classList.add('err'); setTimeout(()=>x.classList.remove('err'),400); });
    document.getElementById('btn-backup-verify').disabled = false;
    document.getElementById('btn-backup-verify').textContent = '確 認 匯 出';
  }
}

function saveBackupHistory(date) {
  try {
    const key = 'backup_history';
    const hist = JSON.parse(localStorage.getItem(key) || '[]');
    hist.unshift(date.toISOString());
    localStorage.setItem(key, JSON.stringify(hist.slice(0, 5)));
  } catch(_) {}
}

function getBackupHistory() {
  try {
    return JSON.parse(localStorage.getItem('backup_history') || '[]');
  } catch(_) { return []; }
}

function startBackupLongPress(e) {
  cancelBackupLongPress();
  backupLongPressTimer = setTimeout(() => {
    showBackupHistory(e);
  }, 600);
}
function cancelBackupLongPress() {
  if (backupLongPressTimer) { clearTimeout(backupLongPressTimer); backupLongPressTimer = null; }
  // Hide popup after short delay
  setTimeout(hideBackupHistory, 2500);
}
function showBackupHistory(e) {
  const hist = getBackupHistory();
  const pop = document.getElementById('backup-history-pop');
  if (!hist.length) { pop.innerHTML = '尚無匯出記錄'; }
  else {
    pop.innerHTML = hist.map(iso => {
      const d = new Date(iso);
      return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }).join('<br>');
  }
  const rect = document.getElementById('btn-backup').getBoundingClientRect();
  pop.style.left = rect.left + 'px';
  pop.style.top = (rect.top - pop.offsetHeight - 8) + 'px';
  pop.classList.add('show');
  // Position after render
  requestAnimationFrame(() => {
    pop.style.left = rect.left + 'px';
    pop.style.top = (rect.top - pop.offsetHeight - 8) + 'px';
  });
}
function hideBackupHistory() {
  document.getElementById('backup-history-pop').classList.remove('show');
}
document.addEventListener('mouseup', () => { cancelBackupLongPress(); hideBackupHistory(); });
document.addEventListener('touchend', () => { cancelBackupLongPress(); });

/* ═══════════════════════ MOBILE SPLIT VIEW ═══════════════════════ */
let mobSplitOn = false;
let _mobSplitPosId = null, _mobSplitNegId = null;

function mobToggleSplit() {
  mobSplitOn = !mobSplitOn;
  const btn = document.getElementById('mob-btn-split');
  const singleView = document.getElementById('mob-ed-body');
  const splitView = document.getElementById('mob-split-view');
  btn.classList.toggle('active', mobSplitOn);
  if (mobSplitOn) {
    singleView.style.display = 'none';
    splitView.style.display = 'flex';
    mobRenderSplit();
  } else {
    splitView.style.display = 'none';
    singleView.style.display = 'flex';
  }
}

function mobRenderSplit() {
  // Determine current date context
  const dateCtx = mobSelectedDate || (() => { const t=new Date(); return {y:t.getFullYear(),m:t.getMonth(),d:t.getDate()}; })();
  const {y,m,d} = dateCtx;
  const dayEntries = entries.filter(e => {
    const dt = e.createdAt?.toDate ? e.createdAt.toDate() : null;
    return dt && dt.getFullYear()===y && dt.getMonth()===m && dt.getDate()===d;
  });
  const posEntry = dayEntries.find(e => e.mood === 'positive');
  const negEntry = dayEntries.find(e => e.mood === 'negative');
  _mobSplitPosId = posEntry ? posEntry.id : null;
  _mobSplitNegId = negEntry ? negEntry.id : null;
  document.getElementById('mob-split-pos-text').value = posEntry ? (posEntry.body||'') : '';
  document.getElementById('mob-split-neg-text').value = negEntry ? (negEntry.body||'') : '';
  // Auto-save on change
  ['mob-split-pos-text','mob-split-neg-text'].forEach(id => {
    const el = document.getElementById(id);
    const fresh = el.cloneNode(true); el.parentNode.replaceChild(fresh, el);
    document.getElementById(id).addEventListener('input', () => mobScheduleSplitSave());
  });
}

let mobSplitSaveTimer = null;
function mobScheduleSplitSave() {
  clearTimeout(mobSplitSaveTimer);
  setSyncState('syncing');
  mobSplitSaveTimer = setTimeout(async () => { await mobSaveSplit(); }, 3000);
}

async function mobSaveSplit() {
  const {db,collection,addDoc,doc,updateDoc,Timestamp} = window._fb;
  const dateCtx = mobSelectedDate || (() => { const t=new Date(); return {y:t.getFullYear(),m:t.getMonth(),d:t.getDate()}; })();
  const {y,m,d} = dateCtx;
  const posBody = document.getElementById('mob-split-pos-text').value.trim();
  const negBody = document.getElementById('mob-split-neg-text').value.trim();
  try {
    const ops = [];
    if (posBody) {
      if (_mobSplitPosId) {
        ops.push(updateDoc(doc(db,'users','diary','entries',_mobSplitPosId),{body:posBody,mood:'positive'}));
        const i=entries.findIndex(e=>e.id===_mobSplitPosId); if(i!==-1) entries[i].body=posBody;
      } else {
        const ref = await addDoc(collection(db,'users','diary','entries'),{body:posBody,mood:'positive',createdAt:Timestamp.fromDate(new Date(y,m,d,12,0,0))});
        _mobSplitPosId = ref.id; await loadEntries();
      }
    }
    if (negBody) {
      if (_mobSplitNegId) {
        ops.push(updateDoc(doc(db,'users','diary','entries',_mobSplitNegId),{body:negBody,mood:'negative'}));
        const i=entries.findIndex(e=>e.id===_mobSplitNegId); if(i!==-1) entries[i].body=negBody;
      } else {
        const ref = await addDoc(collection(db,'users','diary','entries'),{body:negBody,mood:'negative',createdAt:Timestamp.fromDate(new Date(y,m,d,12,1,0))});
        _mobSplitNegId = ref.id; await loadEntries();
      }
    }
    if (ops.length) await Promise.all(ops);
    setSyncState('idle');
  } catch(e) { setSyncState('error'); }
}

async function mobSaveActive() {
  if (mobSplitOn) {
    clearTimeout(mobSplitSaveTimer);
    await mobSaveSplit();
    showToast('已儲存 ✦');
  } else {
    mobSaveEntry();
  }
}

/* ═══════════════════════ PURGE EXPIRED GUESTS ═══════════════════════ */
async function purgeExpiredGuests(){
  const{db,collection,getDocs,doc,deleteDoc}=window._fb;
  try{
    const snap=await getDocs(collection(db,'guest_access'));
    if(snap.empty) return;
    const now=Date.now();
    const expired=snap.docs.filter(d=>(d.data().expiresAt?.toMillis?.()??0)<=now);
    if(!expired.length) return;
    await Promise.all(expired.map(d=>deleteDoc(doc(db,'guest_access',d.id)).catch(()=>{})));
    console.log('[片刻留白] 已清除 '+expired.length+' 筆過期訪客紀錄');
  }catch(_){}
}

/* ═══════════════════════ REVOKE GUESTS ═══════════════════════ */
async function revokeAllGuests(){
  if(!confirm('確定要強制登出所有訪客？他們目前的訪問權限將立即失效。'))return;
  const{db,collection,getDocs,doc,deleteDoc,setDoc,Timestamp}=window._fb;
  try{
    const snap=await getDocs(collection(db,'guest_access'));
    if(snap.empty){showToast('目前沒有訪客');return;}
    const expired=new Timestamp(Math.floor(Date.now()/1000)-1,0);
    await Promise.all(snap.docs.map(d=>{
      try{ return deleteDoc(doc(db,'guest_access',d.id)); }
      catch(_){ return setDoc(doc(db,'guest_access',d.id),{expiresAt:expired},{merge:true}); }
    }));
    showToast('已強制登出 '+snap.size+' 位訪客 ✦');
  }catch(e){showToast('操作失敗：'+e.message);}
}

/* ═══════════════════════ UTILS ═══════════════════════ */
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
</script>
