<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>私密日記</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
  import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
  import {
    getFirestore, collection, addDoc, getDocs, doc,
    deleteDoc, updateDoc, setDoc, getDoc,
    query, orderBy, serverTimestamp, Timestamp
  } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

  // =============================================
  // 🔥 填入你的 Firebase 設定
  // =============================================
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
  };

  // 白名單 UID（你的信任裝置，第一次開啟後從頁面底部複製你的 UID 填進來）
  const TRUSTED_UIDS = [
    "REPLACE_WITH_YOUR_UID",
  ];
  // =============================================

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  window._fb = { auth, db, collection, addDoc, getDocs, doc, deleteDoc, updateDoc, setDoc, getDoc, query, orderBy, serverTimestamp, Timestamp, TRUSTED_UIDS };

  onAuthStateChanged(auth, async (user) => {
    if (!user) { await signInAnonymously(auth); return; }
    window._me = user;
    document.getElementById('display-uid').textContent = user.uid;

    if (TRUSTED_UIDS.includes(user.uid)) {
      window.enterApp('trusted');
    } else {
      // Check if already has valid guest_access
      try {
        const gd = await getDoc(doc(db, 'guest_access', user.uid));
        if (gd.exists()) {
          const exp = gd.data().expiresAt?.toMillis?.() || 0;
          if (exp > Date.now()) { window.enterApp('guest'); return; }
        }
      } catch(_) {}
      document.getElementById('screen-loading').style.display = 'none';
      document.getElementById('screen-guest').style.display = 'flex';
    }
  });

  signInAnonymously(auth).catch(e => {
    document.getElementById('screen-loading').innerHTML = '<p style="color:#c00;font-size:13px">Firebase 連線失敗：' + e.message + '</p>';
  });
</script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink: #1a1208; --ink-soft: #4a3f2f; --ink-faint: #8a7a65;
  --paper: #faf6ef; --paper-warm: #f2ead8; --paper-deep: #e8dcc8;
  --accent: #8b5e3c; --accent-l: #c4956a; --accent-f: #f0e4d4;
  --danger: #9b3131; --ok: #2d6e3e;
  --border: rgba(139,94,60,0.18);
}
body { font-family: 'Noto Sans TC', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; }

/* Loading */
#screen-loading { display:flex; align-items:center; justify-content:center; height:100vh; flex-direction:column; gap:14px; color:var(--ink-faint); font-size:13px; }
.spinner { width:28px; height:28px; border:2px solid var(--paper-deep); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* Guest screen */
#screen-guest { display:none; align-items:center; justify-content:center; min-height:100vh; position:relative; }
#screen-guest::before { content:''; position:fixed; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 27px,rgba(139,94,60,0.05) 28px); pointer-events:none; }

.auth-card { background:#fff; border:1px solid var(--border); border-radius:2px; padding:44px 40px 36px; width:min(400px,90vw); position:relative; box-shadow:0 8px 40px rgba(90,60,20,0.08); }
.auth-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--accent),var(--accent-l)); }

.brand { text-align:center; margin-bottom:32px; }
.brand .ico { font-size:38px; display:block; margin-bottom:10px; }
.brand h1 { font-family:'Noto Serif TC',serif; font-size:20px; letter-spacing:4px; }
.brand p { font-size:11px; color:var(--ink-faint); margin-top:6px; }

.code-inputs { display:flex; gap:8px; justify-content:center; margin:22px 0; }
.code-inputs input { width:44px; height:54px; border:1px solid var(--border); border-radius:2px; text-align:center; font-size:22px; font-weight:500; color:var(--ink); background:var(--paper); outline:none; transition:border-color .2s; font-family:'Noto Serif TC',serif; }
.code-inputs input:focus { border-color:var(--accent); background:#fff; }
.code-inputs input.filled { border-color:var(--accent-l); }
.code-inputs input.err { border-color:var(--danger); background:#fff5f5; animation:shake .3s; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }

.btn-main { width:100%; padding:12px; background:var(--accent); color:#fff; border:none; border-radius:2px; font-size:13px; font-weight:500; letter-spacing:2px; cursor:pointer; font-family:'Noto Sans TC',sans-serif; transition:background .2s; }
.btn-main:hover { background:#7a4f2e; }
.btn-main:disabled { background:var(--paper-deep); color:var(--ink-faint); cursor:default; }

.err-msg { font-size:11px; color:var(--danger); text-align:center; margin-top:10px; min-height:16px; }
.uid-hint { margin-top:20px; padding:10px 12px; background:var(--accent-f); border-radius:2px; font-size:10px; color:var(--ink-faint); line-height:1.7; }
.uid-hint code { font-family:monospace; font-size:10px; color:var(--ink-soft); word-break:break-all; }

/* App screen */
#screen-app { display:none; height:100vh; flex-direction:row; overflow:hidden; }

/* Sidebar */
.sidebar { width:290px; min-width:240px; background:var(--paper-warm); border-right:1px solid var(--border); display:flex; flex-direction:column; }
.sb-head { padding:20px 18px 12px; border-bottom:1px solid var(--border); }
.sb-head h2 { font-family:'Noto Serif TC',serif; font-size:16px; letter-spacing:3px; }
.role-badge { display:inline-flex; align-items:center; gap:4px; font-size:10px; padding:3px 8px; border-radius:20px; margin-top:5px; font-weight:500; letter-spacing:.5px; }
.role-badge.trusted { background:rgba(45,110,62,.12); color:var(--ok); }
.role-badge.guest { background:rgba(139,94,60,.12); color:var(--accent); }
.sb-actions { padding:9px 12px; display:flex; gap:7px; border-bottom:1px solid var(--border); }
.btn-new { flex:1; padding:8px 10px; background:var(--accent); color:#fff; border:none; border-radius:2px; font-size:12px; cursor:pointer; letter-spacing:1px; font-family:'Noto Sans TC',sans-serif; transition:background .2s; }
.btn-new:hover { background:#7a4f2e; }
.btn-gen { display:none; align-items:center; gap:3px; padding:8px 10px; background:none; border:1px solid var(--border); border-radius:2px; font-size:11px; color:var(--ink-soft); cursor:pointer; font-family:'Noto Sans TC',sans-serif; transition:all .2s; white-space:nowrap; }
.btn-gen:hover { border-color:var(--accent-l); color:var(--accent); }

.elist { flex:1; overflow-y:auto; padding:4px 0; }
.elist::-webkit-scrollbar { width:3px; }
.elist::-webkit-scrollbar-thumb { background:var(--paper-deep); }
.eitem { padding:12px 16px; cursor:pointer; border-bottom:1px solid rgba(139,94,60,.07); transition:background .15s; position:relative; }
.eitem:hover { background:rgba(139,94,60,.05); }
.eitem.active { background:rgba(139,94,60,.1); }
.eitem .ed { font-size:10px; color:var(--accent-l); letter-spacing:1px; margin-bottom:2px; font-weight:500; }
.eitem .et { font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.eitem .ep { font-size:11px; color:var(--ink-faint); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.eitem .em { position:absolute; right:12px; top:12px; font-size:14px; }
.empty { padding:36px 18px; text-align:center; color:var(--ink-faint); font-size:11px; line-height:1.8; }

/* Editor */
.editor { flex:1; display:flex; flex-direction:column; overflow:hidden; background:#fff; position:relative; }
.editor::before { content:''; position:absolute; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 31px,rgba(139,94,60,.04) 32px); pointer-events:none; }
.ed-toolbar { display:flex; align-items:center; justify-content:space-between; padding:12px 26px; border-bottom:1px solid var(--border); background:rgba(255,255,255,.96); position:relative; z-index:1; }
.mood-row { display:flex; gap:4px; }
.mb { background:none; border:1px solid transparent; border-radius:50%; width:28px; height:28px; font-size:14px; cursor:pointer; transition:all .15s; }
.mb:hover { border-color:var(--border); background:var(--accent-f); }
.mb.sel { border-color:var(--accent-l); background:var(--accent-f); }
.tr { display:flex; gap:7px; align-items:center; }
.btn-del { padding:6px 12px; background:none; border:1px solid var(--border); border-radius:2px; font-size:11px; color:var(--ink-faint); cursor:pointer; transition:all .2s; }
.btn-del:hover { border-color:var(--danger); color:var(--danger); }
.btn-save { padding:6px 16px; background:var(--accent); color:#fff; border:none; border-radius:2px; font-size:12px; letter-spacing:1px; cursor:pointer; font-family:'Noto Sans TC',sans-serif; transition:background .2s; }
.btn-save:hover { background:#7a4f2e; }
.btn-save:disabled { background:var(--paper-deep); color:var(--ink-faint); cursor:default; }

.ed-body { flex:1; display:flex; flex-direction:column; padding:26px 40px; overflow-y:auto; position:relative; z-index:1; }
.ed-body::-webkit-scrollbar { width:3px; }
.ed-body::-webkit-scrollbar-thumb { background:var(--paper-deep); }
#entry-date { font-size:10px; color:var(--accent-l); letter-spacing:2px; margin-bottom:12px; font-weight:500; }
#entry-title { font-family:'Noto Serif TC',serif; font-size:24px; font-weight:700; color:var(--ink); border:none; outline:none; width:100%; background:transparent; margin-bottom:14px; }
#entry-title::placeholder { color:var(--paper-deep); }
.div-line { height:1px; background:var(--border); margin-bottom:18px; }
#entry-body { font-family:'Noto Serif TC',serif; font-size:15px; line-height:2; color:var(--ink-soft); border:none; outline:none; width:100%; flex:1; min-height:340px; background:transparent; resize:none; }
#entry-body::placeholder { color:rgba(139,94,60,.2); }

.welcome { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--ink-faint); text-align:center; position:relative; z-index:1; padding:40px; }
.welcome .wi { font-size:52px; opacity:.35; margin-bottom:18px; }
.welcome h3 { font-family:'Noto Serif TC',serif; font-size:17px; font-weight:500; margin-bottom:8px; color:var(--ink-soft); }
.welcome p { font-size:12px; line-height:1.8; }

.statusbar { padding:5px 40px; border-top:1px solid var(--border); font-size:10px; color:var(--ink-faint); background:var(--paper); z-index:1; display:flex; align-items:center; gap:5px; }
.sdot { width:5px; height:5px; border-radius:50%; background:#6bb36b; flex-shrink:0; }

/* Token modal — uses normal flow, no fixed */
.modal-wrap { display:none; position:fixed; inset:0; background:rgba(26,18,8,.52); z-index:200; align-items:center; justify-content:center; }
.modal-wrap.open { display:flex; }
.modal { background:#fff; border-radius:2px; padding:32px 36px; width:min(360px,90vw); border:1px solid var(--border); }
.modal h3 { font-family:'Noto Serif TC',serif; font-size:16px; margin-bottom:6px; }
.modal .sub { font-size:11px; color:var(--ink-faint); line-height:1.7; margin-bottom:18px; }
.dur-row { display:flex; gap:7px; margin-bottom:18px; }
.dur-btn { flex:1; padding:7px; border:1px solid var(--border); background:none; border-radius:2px; font-size:11px; cursor:pointer; transition:all .15s; font-family:'Noto Sans TC',sans-serif; color:var(--ink-soft); }
.dur-btn:hover { border-color:var(--accent-l); }
.dur-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
.token-box { text-align:center; padding:22px; background:var(--paper); border-radius:2px; border:1px dashed var(--border); margin-bottom:14px; }
.token-num { font-family:'Noto Serif TC',serif; font-size:40px; font-weight:700; letter-spacing:10px; color:var(--accent); }
.token-tim { font-size:11px; color:var(--ink-faint); margin-top:7px; }
.token-tim span { color:var(--accent); font-weight:500; }
.btn-outline { width:100%; padding:9px; background:none; border:1px solid var(--border); border-radius:2px; font-size:12px; cursor:pointer; font-family:'Noto Sans TC',sans-serif; color:var(--ink-soft); transition:all .2s; margin-top:7px; }
.btn-outline:hover { background:var(--paper); }

/* Toast */
.toast { position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--ink); color:#fff; padding:9px 22px; border-radius:24px; font-size:12px; z-index:9999; transition:transform .3s ease; pointer-events:none; white-space:nowrap; }
.toast.show { transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- Loading -->
<div id="screen-loading">
  <div class="spinner"></div>
  <span>連線中…</span>
</div>

<!-- Guest -->
<div id="screen-guest">
  <div class="auth-card">
    <div class="brand">
      <span class="ico">🔐</span>
      <h1>私密日記</h1>
      <p>請從信任裝置取得 6 位數驗證碼</p>
    </div>
    <div class="code-inputs" id="code-inputs">
      <input type="text" maxlength="1" inputmode="numeric">
      <input type="text" maxlength="1" inputmode="numeric">
      <input type="text" maxlength="1" inputmode="numeric">
      <input type="text" maxlength="1" inputmode="numeric">
      <input type="text" maxlength="1" inputmode="numeric">
      <input type="text" maxlength="1" inputmode="numeric">
    </div>
    <button class="btn-main" id="btn-verify" onclick="verifyToken()" disabled>驗 證 進 入</button>
    <div class="err-msg" id="guest-err"></div>
    <div class="uid-hint">
      此裝置 UID（讓信任裝置加白名單用）：<br>
      <code id="display-uid">—</code>
    </div>
  </div>
</div>

<!-- App -->
<div id="screen-app">
  <div class="sidebar">
    <div class="sb-head">
      <h2>私密日記</h2>
      <div class="role-badge" id="role-badge"></div>
    </div>
    <div class="sb-actions">
      <button class="btn-new" onclick="newEntry()">＋ 新增</button>
      <button class="btn-gen" id="btn-gen" onclick="openModal()">🔑 產生驗證碼</button>
    </div>
    <div class="elist" id="elist"><div class="empty">載入中…</div></div>
  </div>

  <div class="editor">
    <div class="welcome" id="welcome">
      <div class="wi">✍️</div>
      <h3>選擇一篇日記</h3>
      <p>或點擊「新增」開始書寫今天</p>
    </div>
    <div id="edview" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
      <div class="ed-toolbar">
        <div class="mood-row">
          <button class="mb" data-mood="😊" onclick="selMood(this)">😊</button>
          <button class="mb" data-mood="😔" onclick="selMood(this)">😔</button>
          <button class="mb" data-mood="😤" onclick="selMood(this)">😤</button>
          <button class="mb" data-mood="😴" onclick="selMood(this)">😴</button>
          <button class="mb" data-mood="🤔" onclick="selMood(this)">🤔</button>
          <button class="mb" data-mood="🥰" onclick="selMood(this)">🥰</button>
        </div>
        <div class="tr">
          <button class="btn-del" id="btn-del" style="display:none" onclick="delEntry()">刪除</button>
          <button class="btn-save" id="btn-save" onclick="saveEntry()">儲 存</button>
        </div>
      </div>
      <div class="ed-body">
        <div id="entry-date"></div>
        <input type="text" id="entry-title" placeholder="今天的標題…">
        <div class="div-line"></div>
        <textarea id="entry-body" placeholder="寫下你的想法、感受、今天發生的事…"></textarea>
      </div>
      <div class="statusbar">
        <span class="sdot"></span>
        <span id="status-txt">已連線 · 私密保護中</span>
      </div>
    </div>
  </div>
</div>

<!-- Token modal -->
<div class="modal-wrap" id="modal">
  <div class="modal">
    <h3>產生訪客驗證碼</h3>
    <p class="sub">選擇有效時間，將 6 位數驗證碼給其他裝置輸入。時間到期後自動失效。</p>
    <div class="dur-row">
      <button class="dur-btn active" data-min="30" onclick="setDur(this)">30 分鐘</button>
      <button class="dur-btn" data-min="120" onclick="setDur(this)">2 小時</button>
      <button class="dur-btn" data-min="480" onclick="setDur(this)">8 小時</button>
    </div>
    <div class="token-box">
      <div class="token-num" id="token-num">— — — — — —</div>
      <div class="token-tim" id="token-tim">點擊下方按鈕產生</div>
    </div>
    <button class="btn-main" onclick="generateToken()">產 生 新 驗 證 碼</button>
    <button class="btn-outline" onclick="closeModal()">關 閉</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let curId = null, mood = '', entries = [], durMin = 30, timerInt = null;

// Code input UX
document.querySelectorAll('.code-inputs input').forEach((inp, i, all) => {
  inp.addEventListener('input', e => {
    e.target.value = e.target.value.replace(/\D/g,'');
    if (e.target.value && i < all.length-1) all[i+1].focus();
    all.forEach(x => x.classList.toggle('filled', !!x.value));
    document.getElementById('btn-verify').disabled = [...all].map(x=>x.value).join('').length < 6;
  });
  inp.addEventListener('keydown', e => { if (e.key==='Backspace' && !inp.value && i>0) all[i-1].focus(); });
  inp.addEventListener('paste', e => {
    e.preventDefault();
    const p = (e.clipboardData||window.clipboardData).getData('text').replace(/\D/g,'').slice(0,6);
    p.split('').forEach((ch,j) => { if (all[j]) all[j].value=ch; });
    if (all[Math.min(p.length,5)]) all[Math.min(p.length,5)].focus();
    document.getElementById('btn-verify').disabled = p.length < 6;
    all.forEach(x => x.classList.toggle('filled', !!x.value));
  });
});

// Guest verify
async function verifyToken() {
  const { db, doc, getDoc, setDoc, Timestamp } = window._fb;
  const code = [...document.querySelectorAll('.code-inputs input')].map(x=>x.value).join('');
  const errEl = document.getElementById('guest-err');
  errEl.textContent = '';
  document.getElementById('btn-verify').disabled = true;
  document.getElementById('btn-verify').textContent = '驗證中…';
  try {
    const td = await getDoc(doc(db, 'tokens', code));
    if (!td.exists()) throw new Error('驗證碼不存在');
    const exp = td.data().expiresAt?.toMillis?.() || 0;
    if (exp < Date.now()) throw new Error('驗證碼已過期');
    // Register guest_access
    await setDoc(doc(db, 'guest_access', window._me.uid), {
      grantedAt: Timestamp.now(),
      expiresAt: td.data().expiresAt
    });
    window.enterApp('guest');
  } catch(e) {
    errEl.textContent = e.message;
    document.querySelectorAll('.code-inputs input').forEach(x => { x.classList.add('err'); setTimeout(()=>x.classList.remove('err'),400); });
    document.getElementById('btn-verify').disabled = false;
    document.getElementById('btn-verify').textContent = '驗 證 進 入';
  }
}

// Enter app
window.enterApp = function(role) {
  document.getElementById('screen-loading').style.display = 'none';
  document.getElementById('screen-guest').style.display = 'none';
  document.getElementById('screen-app').style.display = 'flex';
  window._role = role;
  const b = document.getElementById('role-badge');
  if (role === 'trusted') {
    b.textContent = '✦ 信任裝置'; b.className = 'role-badge trusted';
    document.getElementById('btn-gen').style.display = 'inline-flex';
    document.getElementById('status-txt').textContent = '信任裝置 · 完整存取';
  } else {
    b.textContent = '◈ 訪客模式'; b.className = 'role-badge guest';
    document.getElementById('status-txt').textContent = '訪客模式 · 限時存取';
  }
  loadEntries();
};

// Load entries
async function loadEntries() {
  const { db, collection, query, orderBy, getDocs } = window._fb;
  try {
    const q = query(collection(db,'users','diary','entries'), orderBy('createdAt','desc'));
    const snap = await getDocs(q);
    entries = snap.docs.map(d => ({id:d.id,...d.data()}));
    renderList();
  } catch(e) {
    document.getElementById('elist').innerHTML = '<div class="empty">載入失敗<br><small>'+esc(e.message)+'</small></div>';
  }
}

function renderList() {
  const el = document.getElementById('elist');
  if (!entries.length) { el.innerHTML = '<div class="empty">還沒有日記<br>點擊「新增」開始吧</div>'; return; }
  el.innerHTML = entries.map(e => {
    const d = e.createdAt?.toDate ? e.createdAt.toDate() : new Date();
    const ds = d.toLocaleDateString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit',weekday:'short'});
    return `<div class="eitem${e.id===curId?' active':''}" onclick="openEntry('${e.id}')">
      <div class="ed">${ds}</div>
      <div class="et">${esc(e.title||'（無標題）')}</div>
      <div class="ep">${esc((e.body||'').slice(0,46))}</div>
      ${e.mood?`<span class="em">${e.mood}</span>`:''}
    </div>`;
  }).join('');
}

function newEntry() {
  curId=null; mood='';
  document.getElementById('entry-title').value='';
  document.getElementById('entry-body').value='';
  document.getElementById('entry-date').textContent =
    new Date().toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
  document.querySelectorAll('.mb').forEach(b=>b.classList.remove('sel'));
  document.getElementById('btn-del').style.display='none';
  document.getElementById('welcome').style.display='none';
  document.getElementById('edview').style.display='flex';
  renderList();
  document.getElementById('entry-title').focus();
}

function openEntry(id) {
  const e = entries.find(x=>x.id===id); if (!e) return;
  curId=id; mood=e.mood||'';
  const d = e.createdAt?.toDate ? e.createdAt.toDate() : new Date();
  document.getElementById('entry-date').textContent =
    d.toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
  document.getElementById('entry-title').value = e.title||'';
  document.getElementById('entry-body').value = e.body||'';
  document.querySelectorAll('.mb').forEach(b=>b.classList.toggle('sel',b.dataset.mood===mood));
  document.getElementById('btn-del').style.display='inline-block';
  document.getElementById('welcome').style.display='none';
  document.getElementById('edview').style.display='flex';
  renderList();
}

function selMood(btn) {
  const same = mood===btn.dataset.mood;
  document.querySelectorAll('.mb').forEach(b=>b.classList.remove('sel'));
  mood = same ? '' : btn.dataset.mood;
  if (!same) btn.classList.add('sel');
}

async function saveEntry() {
  const { db, collection, addDoc, doc, updateDoc, serverTimestamp } = window._fb;
  const title = document.getElementById('entry-title').value.trim();
  const body = document.getElementById('entry-body').value.trim();
  if (!title && !body) { showToast('請輸入內容'); return; }
  const bs = document.getElementById('btn-save');
  bs.disabled=true; bs.textContent='儲存中…';
  const data = { title:title||'（無標題）', body, mood };
  try {
    if (curId) {
      await updateDoc(doc(db,'users','diary','entries',curId), data);
      const idx = entries.findIndex(e=>e.id===curId);
      if (idx!==-1) entries[idx]={...entries[idx],...data};
      showToast('已更新 ✓');
    } else {
      data.createdAt = serverTimestamp();
      const ref = await addDoc(collection(db,'users','diary','entries'), data);
      curId = ref.id;
      await loadEntries();
      showToast('已儲存 ✓');
    }
    document.getElementById('btn-del').style.display='inline-block';
    renderList();
  } catch(e) { showToast('儲存失敗：'+e.message); }
  bs.disabled=false; bs.textContent='儲 存';
}

async function delEntry() {
  if (!curId || !confirm('確定刪除這篇日記？')) return;
  const { db, doc, deleteDoc } = window._fb;
  try {
    await deleteDoc(doc(db,'users','diary','entries',curId));
    entries = entries.filter(e=>e.id!==curId); curId=null;
    document.getElementById('edview').style.display='none';
    document.getElementById('welcome').style.display='flex';
    renderList(); showToast('已刪除');
  } catch(e) { showToast('刪除失敗'); }
}

// Token modal
function openModal() { document.getElementById('modal').classList.add('open'); }
function closeModal() { document.getElementById('modal').classList.remove('open'); clearInterval(timerInt); }
function setDur(btn) {
  document.querySelectorAll('.dur-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); durMin = parseInt(btn.dataset.min);
}

async function generateToken() {
  const { db, doc, setDoc, Timestamp } = window._fb;
  clearInterval(timerInt);
  const code = String(Math.floor(100000+Math.random()*900000));
  const expiresAt = new Timestamp(Math.floor(Date.now()/1000)+durMin*60, 0);
  try {
    await setDoc(doc(db,'tokens',code), {
      createdBy: window._me.uid,
      createdAt: Timestamp.now(),
      expiresAt, durationMinutes: durMin
    });
    document.getElementById('token-num').textContent = code;
    let rem = durMin*60;
    const tick = () => {
      const m=Math.floor(rem/60), s=rem%60;
      document.getElementById('token-tim').innerHTML = `有效時間剩餘 <span>${m}:${String(s).padStart(2,'0')}</span>`;
      if (rem<=0) { clearInterval(timerInt); document.getElementById('token-tim').textContent='已過期'; document.getElementById('token-num').textContent='— — — — — —'; }
      rem--;
    };
    tick(); timerInt = setInterval(tick, 1000);
  } catch(e) { showToast('產生失敗：'+e.message); }
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
</script>
